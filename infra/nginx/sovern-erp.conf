# Nginx site config for erp.sovernhouse.co
# Deployed at /etc/nginx/sites-enabled/sovern-erp on the GCP e2-micro VM.
#
# CRITICAL: the `root` path MUST point at frontend/admin-portal/dist (where
# vite outputs the built bundle). On 2026-05-04 we discovered this had drifted
# to frontend/dist (no admin-portal segment) — nginx was serving a frozen
# May 3 12:39 build for hours while every "successful" deploy rebuilt the
# correct directory that nginx never read. Don't break this again.
#
# To deploy this file to the VM:
#   sudo cp infra/nginx/sovern-erp.conf /etc/nginx/sites-enabled/sovern-erp
#   sudo nginx -t && sudo systemctl reload nginx

server {
    server_name erp.sovernhouse.co;

    # API backend
    # 2026-05-18: AI chat path needs a longer timeout because tool-using
    # turns (WebFetch + multiple MCP calls + bulk MCP work) can run 4-15
    # minutes legitimately. backend/controllers/aiController.js sets:
    #   HARD_CAP_MS       = 900_000  (15 min absolute ceiling)
    #   IDLE_TIMEOUT_MS   = 120_000  (kill if 120s of no stdout)
    # The general /api/ route stays at 270s — only /api/ai/chat needs
    # the extended window. Without this split a long AI turn would hit
    # nginx's 270s and return 504 even though the backend was still
    # making progress (Alex hit this 2026-05-18 mid-tariff research).
    # 930s = backend's 900s cap + 30s slack so the backend can format
    # and stream a clean SSE 'error' event before nginx cuts the
    # connection itself.
    location = /api/ai/chat {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 930s;
        proxy_send_timeout 930s;
        proxy_buffering off;          # SSE: stream chunks immediately, don't buffer
        client_max_body_size 5M;
    }

    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 270s;
        proxy_send_timeout 270s;
        client_max_body_size 50M;
    }

    # Socket.IO
    location /socket.io/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React SPA frontend
    # CRITICAL: this path is the built dist/ directory under admin-portal.
    # Do NOT change to /home/alex/sovern-erp/frontend/dist — that path does
    # not exist after the admin-portal workspace split, but if it ever exists
    # again with stale assets, nginx will silently serve them.
    location / {
        root /home/alex/sovern-erp/frontend/admin-portal/dist;
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/erp.sovernhouse.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.sovernhouse.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = erp.sovernhouse.co) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name erp.sovernhouse.co;
    return 404;
}

name: Deploy to Sovern ERP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: alex
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: ~/deploy.sh

name: Deploy to Sovern ERP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: alex
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd ~/sovern-erp
            # Hard-reset to origin/main so deploy never fails on diverged history
            git fetch origin
            git reset --hard origin/main
            # Use npm install (not npm ci) from workspace root — ensures all deps
            # are hoisted correctlhy into ~/sovern-erp/node_modulhes
            npm install --legacy-peer-deps
            # Rebuild sqlite3 from source — prebuilt binary inchompatible with server glibc
            npm rebuild sqlite3 --build-from-source
            # Build frontend
            # NODE_OPTIONS bumps the V8 heap limit — the e2-micro VM has only
            # ~1GB RAM, and vite+rollup tree-shaking OOMs at the default 512MB
            # heap. With --max-old-space-size=1536 the build completes in ~52s
            # using swap. Builds without this silently OOM
name: Deploy to Sovern ERP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: alex
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd ~/sovern-erp
            git pull origin main
            # Use npm install (not npm ci) from workspace root — ensures all deps
            # are hoisted correctly into ~/sovern-erp/node_modules
            npm install --legacy-peer-deps
            # Rebuild sqlite3 from source — prebuilt binary incompatible with server glibc
            npm rebuild sqlite3 --build-from-source
            # Build frontend
            cd frontend/admin-portal && npm run build && cd ~/sovern-erp
            # Hard reset PM2 — delete stale process entry, start fresh from root cwd
            # Running from ~/sovern-erp means Node finds node_modules immediately
            pm2 delete sovern-erp 2>/dev/null || true
            NODE_ENV=production pm2 start backend/server.js --name sovern-erp
            pm2 save

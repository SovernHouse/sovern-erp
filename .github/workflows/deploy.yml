name: Deploy to Sovern ERP

# Two-job pipeline:
#   1. build-frontend  — runs on GitHub runner (7 GB RAM), builds Vite dist
#   2. deploy          — SCPs the dist to VM, installs backend deps, restarts pm2
#
# The VM NEVER runs npm run build. It only receives the pre-built dist and
# restarts the Node backend. This keeps peak VM memory under 200 MB during
# deploys, eliminating the swap-thrash crash loop.
#
# Required GitHub Secrets:
#   VM_HOST     — GCP VM external IP
#   VM_USER     — SSH username (alex)
#   VM_SSH_KEY  — SSH private key (matching public key in VM authorized_keys)

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── 1. Build frontend on the runner ────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/admin-portal/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend/admin-portal

      - name: Build admin-portal
        run: npm run build
        working-directory: frontend/admin-portal

      - name: Verify dist
        run: |
          test -f frontend/admin-portal/dist/index.html || \
            (echo "ERROR: dist/index.html missing" && exit 1)
          echo "Build OK — $(ls frontend/admin-portal/dist/assets/ | wc -l) assets"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-portal-dist
          path: frontend/admin-portal/dist
          retention-days: 1

  # ── 2. Deploy to VM ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VM
    needs: build-frontend
    runs-on: ubuntu-latest

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-portal-dist
          path: admin-portal-dist

      - name: Upload dist to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          source: "admin-portal-dist/*"
          target: "~/sovern-erp-dist-incoming"
          strip_components: 1

      - name: Deploy backend and swap frontend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e

            echo "=== Pulling code ==="
            cd ~/sovern-erp
            git fetch origin
            git reset --hard origin/main

            echo "=== Installing backend dependencies ==="
            cd ~/sovern-erp/backend
            npm install --omit=dev

            echo "=== Swapping frontend dist ==="
            DIST=~/sovern-erp/frontend/admin-portal/dist
            STAGED=~/sovern-erp-dist-incoming
            mkdir -p "$DIST"
            rsync -a --delete "$STAGED/" "$DIST/"
            rm -rf "$STAGED"
            test -f "$DIST/index.html" || \
              (echo "ERROR: index.html missing after swap" && exit 1)
            echo "Dist swapped OK — $(ls "$DIST/assets/" 2>/dev/null | wc -l) assets"

            echo "=== Restarting backend ==="
            # 2026-05-18 fix: always start via ecosystem.config.js so the
            # env block (SQLITE_STORAGE, etc.) is injected. The previous
            # `pm2 start server.js --name sovern-erp` cold-start path
            # ignored ecosystem.config.js, which made Sequelize fall back
            # to backend/database.sqlite (a different, empty file) and
            # broke the Gmail-account lookup (ConnectedGoogleAccount.findOne
            # returned null even with FW + SH accounts in the prod DB).
            # That left two failed OutreachEmail rows on Ultimate Floors
            # and confused subsequent debugging until the issue was
            # reproduced live.
            if pm2 describe sovern-erp > /dev/null 2>&1; then
              # Use --update-env so any change to ecosystem.config.js's env
              # block reaches the process on the next restart.
              pm2 restart ecosystem.config.js --update-env
            else
              pm2 start ecosystem.config.js
            fi
            pm2 save --force 2>/dev/null || true

            echo "=== Health check ==="
            for i in $(seq 1 18); do
              sleep 5
              HEALTH=$(curl -s -o /dev/null -w '%{http_code}' \
                http://localhost:3001/api/health || echo "000")
              echo "Attempt $i: $HEALTH"
              if [ "$HEALTH" = "200" ]; then
                echo "Deploy successful."
                exit 0
              fi
            done
            echo "ERROR: health check failed after 90s"
            pm2 status
            pm2 logs sovern-erp --lines 50 --nostream || true
            exit 1

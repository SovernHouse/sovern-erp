name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHA=${GITHUB_SHA::8}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$SHA" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/trading-erp:latest
            ghcr.io/${{ github.repository_owner }}/trading-erp:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/trading-erp:v${{ steps.version.outputs.version }}
          outputs: type=docker,dest=/tmp/image.tar

      - name: Push Docker image to registry
        run: |
          docker load --input /tmp/image.tar
          docker push ghcr.io/${{ github.repository_owner }}/trading-erp:latest
          docker push ghcr.io/${{ github.repository_owner }}/trading-erp:${{ steps.version.outputs.tag }}
          docker push ghcr.io/${{ github.repository_owner }}/trading-erp:v${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to ${{ github.event.inputs.environment }}
        run: |
          echo "Deploying version: ${{ steps.version.outputs.version }}"
          echo "SHA: ${{ steps.version.outputs.sha }}"
          echo "Tag: ${{ steps.version.outputs.tag }}"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo ""
          echo "Deployment placeholder - implement your deployment strategy:"
          echo "- kubernetes apply -f deployment.yaml"
          echo "- docker pull ghcr.io/${{ github.repository_owner }}/trading-erp:${{ steps.version.outputs.tag }}"
          echo "- docker run -d ... (with your deployment configuration)"

      - name: Create deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ github.event.inputs.environment }}',
              auto_merge: false,
              production_environment: '${{ github.event.inputs.environment }}' === 'production',
              description: 'Deployment of v${{ steps.version.outputs.version }} (${{ steps.version.outputs.sha }})',
              required_contexts: []
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              description: 'Deployment completed',
              environment_url: '${{ github.event.inputs.environment }}' === 'production'
                ? 'https://api.trading-erp.com'
                : 'https://staging-api.trading-erp.com'
            });

      - name: Notify deployment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? 'SUCCESS' : 'FAILURE';
            github.rest.issues.createComment({
              issue_number: context.issue.number || null,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Deployment Status: ${status}\nEnvironment: ${{ github.event.inputs.environment }}\nVersion: v${{ steps.version.outputs.version }}`
            }).catch(() => console.log('No PR to comment on'));

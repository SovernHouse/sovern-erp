name: Deploy to Sovern ERP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: alex
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: ~/deploy.sh

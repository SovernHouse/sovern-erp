name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: self-hosted
    strategy:
      matrix:
        node-version: ['18']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Rebuild native modules for CI platform
        run: npm rebuild sqlite3

      - name: Lint
        run: npm run lint || echo "Linting skipped - not configured"

      - name: Run backend unit tests
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          RATE_LIMIT_MAX_REQUESTS: '10000'
        run: cd backend && NODE_ENV=test JWT_SECRET=test-secret JWT_REFRESH_SECRET=test-refresh-secret RATE_LIMIT_MAX_REQUESTS=10000 npx jest --passWithNoTests --forceExit

      # Playwright E2E and Docker steps removed — no E2E tests written yet and
      # the Docker build step consumed ~15 min of Actions minutes per push with
      # no actionable output. Re-add when E2E tests exist.

  badge-comment:
    name: Add CI Badge Comment
    runs-on: self-hosted
    if: github.event_name == 'pull_request'
    steps:
      - name: Comment PR with CI Badge
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '[![CI Pipeline](https://img.shields.io/github/actions/workflow/status/${{ github.repository }}/ci.yml?branch=develop&label=CI%20Pipeline&style=flat-square)](https://github.com/${{ github.repository }}/actions/workflows/ci.yml)'
            })
